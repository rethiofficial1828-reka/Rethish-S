<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="360" fill="#050816"/>

  <g stroke="url(#lineGrad)" stroke-width="1" opacity="0.35">
    <line x1="120" y1="80" x2="320" y2="60"/>
    <line x1="120" y1="80" x2="300" y2="180"/>
    <line x1="320" y1="60" x2="520" y2="90"/>
    <line x1="300" y1="180" x2="520" y2="90"/>
    <line x1="300" y1="180" x2="300" y2="290"/>
    <line x1="520" y1="90" x2="700" y2="70"/>
    <line x1="520" y1="90" x2="680" y2="200"/>
    <line x1="300" y1="290" x2="500" y2="300"/>
    <line x1="680" y1="200" x2="500" y2="300"/>
    <line x1="680" y1="200" x2="800" y2="150"/>
    <line x1="700" y1="70" x2="800" y2="150"/>
    <line x1="120" y1="80" x2="300" y2="290"/>
  </g>

  <g stroke="#00FF9D" stroke-width="2" fill="none" opacity="0.9">
    <path id="pulse1" d="M120,80 L320,60 L520,90 L700,70 L800,150" stroke-dasharray="14 400">
      <animate attributeName="stroke-dashoffset" from="0" to="-414" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path id="pulse2" d="M120,80 L300,180 L300,290 L500,300 L680,200" stroke="#EC4899" stroke-dasharray="14 400">
      <animate attributeName="stroke-dashoffset" from="0" to="-414" dur="4.2s" begin="0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="Fira Code, monospace" font-size="12" fill="#CBD5E1">
    <g>
      <circle cx="120" cy="80" r="9" fill="#111827" stroke="#00E5FF" stroke-width="2"/>
      <animate xlink:href="#n1" attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      <text x="70" y="60">Python</text>
    </g>
    <g>
      <circle cx="320" cy="60" r="9" fill="#111827" stroke="#8B5CF6" stroke-width="2"/>
      <text x="325" y="40">C</text>
    </g>
    <g>
      <circle cx="300" cy="180" r="9" fill="#111827" stroke="#00FF9D" stroke-width="2"/>
      <text x="215" y="185">Linux / Bash</text>
    </g>
    <g>
      <circle cx="520" cy="90" r="9" fill="#111827" stroke="#EC4899" stroke-width="2"/>
      <text x="525" y="70">Networking</text>
    </g>
    <g>
      <circle cx="700" cy="70" r="9" fill="#111827" stroke="#00E5FF" stroke-width="2"/>
      <text x="705" y="50">Wireshark</text>
    </g>
    <g>
      <circle cx="300" cy="290" r="9" fill="#111827" stroke="#F59E0B" stroke-width="2"/>
      <text x="200" y="315">Security Concepts</text>
    </g>
    <g>
      <circle cx="500" cy="300" r="9" fill="#111827" stroke="#8B5CF6" stroke-width="2"/>
      <text x="440" y="325">CTF</text>
    </g>
    <g>
      <circle cx="680" cy="200" r="9" fill="#111827" stroke="#00FF9D" stroke-width="2"/>
      <text x="685" y="220">Git / GitHub</text>
    </g>
    <g>
      <circle cx="800" cy="150" r="9" fill="#111827" stroke="#EC4899" stroke-width="2"/>
      <text x="805" y="135">Kali</text>
    </g>
  </g>

  <g fill="#F8FAFC">
    <circle cx="120" cy="80" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="60" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="180" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="90" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="70" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="290" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="300" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="200" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="150" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
