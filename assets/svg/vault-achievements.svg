<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vaultGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="150" r="110" fill="url(#vaultGlow)">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="160" cy="150" r="90" fill="#111827" stroke="#FFD700" stroke-width="3"/>
  <circle cx="160" cy="150" r="70" fill="none" stroke="#1F2937" stroke-width="6" stroke-dasharray="6 8"/>

  <g transform="translate(160,150)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" additive="sum"/>
    <circle r="4" cx="0" cy="-55" fill="#FFD700"/>
    <circle r="4" cx="47.6" cy="-27.5" fill="#FFD700"/>
    <circle r="4" cx="47.6" cy="27.5" fill="#FFD700"/>
    <circle r="4" cx="0" cy="55" fill="#FFD700"/>
    <circle r="4" cx="-47.6" cy="27.5" fill="#FFD700"/>
    <circle r="4" cx="-47.6" cy="-27.5" fill="#FFD700"/>
  </g>

  <rect x="145" y="130" width="30" height="24" rx="4" fill="#0B1120" stroke="#FFD700" stroke-width="2.5"/>
  <path d="M150,130 v-12 a10,10 0 0 1 20,0 v12" fill="none" stroke="#FFD700" stroke-width="3"/>
  <circle cx="160" cy="141" r="3.5" fill="#FFD700">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <text x="160" y="245" text-anchor="middle" fill="#F8FAFC" font-family="Fira Code, monospace" font-size="14">CYBER RANK: RECRUIT+</text>

  <rect x="60" y="260" width="200" height="12" rx="6" fill="#1F2937"/>
  <rect x="60" y="260" width="0" height="12" rx="6" fill="#FFD700">
    <animate attributeName="width" values="0;136;136" keyTimes="0;0.6;1" dur="3s" fill="freeze"/>
  </rect>
  <text x="160" y="290" text-anchor="middle" fill="#94A3B8" font-family="Fira Code, monospace" font-size="11">XP 680 / 1000 → next rank</text>
</svg>
