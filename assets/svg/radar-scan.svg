<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="radarBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF9D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00FF9D" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <circle cx="160" cy="160" r="140" fill="url(#radarBg)" stroke="#00FF9D" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="160" cy="160" r="105" fill="none" stroke="#1F2937" stroke-width="1"/>
  <circle cx="160" cy="160" r="70" fill="none" stroke="#1F2937" stroke-width="1"/>
  <circle cx="160" cy="160" r="35" fill="none" stroke="#1F2937" stroke-width="1"/>
  <line x1="20" y1="160" x2="300" y2="160" stroke="#1F2937" stroke-width="1"/>
  <line x1="160" y1="20" x2="160" y2="300" stroke="#1F2937" stroke-width="1"/>

  <g>
    <path d="M160,160 L160,20 A140,140 0 0,1 268,105 Z" fill="url(#sweepGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <circle cx="210" cy="110" r="4" fill="#EC4899">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="200" r="3.5" fill="#00E5FF">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="215" r="3" fill="#F59E0B">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="2.6s" repeatCount="indefinite"/>
  </circle>

  <text x="160" y="300" text-anchor="middle" fill="#94A3B8" font-family="Fira Code, monospace" font-size="12">NETWORK_RADAR :: SCANNING</text>
</svg>
