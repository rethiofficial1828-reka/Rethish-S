<svg width="320" height="340" viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M160,30 L260,65 V150 C260,220 210,265 160,290 C110,265 60,220 60,150 V65 Z"/>
    </clipPath>
  </defs>

  <path d="M160,30 L260,65 V150 C260,220 210,265 160,290 C110,265 60,220 60,150 V65 Z"
        fill="url(#shieldGrad)" stroke="#00FF9D" stroke-width="2.5">
    <animate attributeName="stroke" values="#00FF9D;#00E5FF;#00FF9D" dur="3s" repeatCount="indefinite"/>
  </path>

  <g clip-path="url(#shieldClip)">
    <rect x="40" y="0" width="240" height="24" fill="#00FF9D" opacity="0.5">
      <animate attributeName="y" values="20;290;20" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <line x1="60" y1="100" x2="260" y2="100" stroke="#1F2937" stroke-width="1"/>
    <line x1="60" y1="150" x2="260" y2="150" stroke="#1F2937" stroke-width="1"/>
    <line x1="60" y1="200" x2="260" y2="200" stroke="#1F2937" stroke-width="1"/>
  </g>

  <path d="M120,155 l25,25 l55,-55" fill="none" stroke="#00FF9D" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>

  <g font-family="Fira Code, monospace" font-size="13">
    <text x="160" y="315" text-anchor="middle" fill="#94A3B8">FIREWALL :: ACTIVE</text>
    <text x="160" y="333" text-anchor="middle" fill="#00FF9D">threats blocked: 100%</text>
  </g>
</svg>
