<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <circle cx="160" cy="160" r="120" fill="url(#coreGlow)">
    <animate attributeName="r" values="110;128;110" dur="3s" repeatCount="indefinite"/>
  </circle>

  <g fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.7">
    <circle cx="160" cy="160" r="95" stroke-dasharray="4 10">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="160" r="75" stroke-dasharray="2 6">
      <animateTransform attributeName="transform" type="rotate" from="360 160 160" to="0 160 160" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <polygon points="160,95 213,127.5 213,192.5 160,225 107,192.5 107,127.5"
           fill="#111827" stroke="#00E5FF" stroke-width="2">
    <animate attributeName="stroke" values="#00E5FF;#8B5CF6;#EC4899;#00E5FF" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <circle cx="160" cy="160" r="26" fill="#00E5FF">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="22;28;22" dur="2s" repeatCount="indefinite"/>
  </circle>

  <g fill="#F8FAFC">
    <circle cx="160" cy="50" r="4">
      <animateMotion path="M0,0 a110,110 0 1,0 0.1,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="50" r="3" fill="#00FF9D">
      <animateMotion path="M0,0 a80,80 0 1,1 0.1,0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="160" y="300" text-anchor="middle" fill="#94A3B8" font-family="Fira Code, monospace" font-size="12">AI_CORE :: STATUS NOMINAL</text>
</svg>
