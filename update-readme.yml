name: Auto-update README

on:
  schedule:
    # Runs once a day at 03:00 UTC so repo list stays fresh even if you don't push
    - cron: "0 3 * * *"
  push:
    branches: [main]
    paths:
      - "certificates.json"
      - "scripts/update-readme.js"
  workflow_dispatch: {} # lets you click "Run workflow" manually on GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate README sections
        env:
          # Default GITHUB_TOKEN can't see your private repos — this uses a
          # Personal Access Token you create once (see README setup section).
          GITHUB_TOKEN: ${{ secrets.PROFILE_README_PAT }}
          GH_USERNAME: rethiofficial1828-reka
        run: node scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update README (repos/certs)"
          git push
